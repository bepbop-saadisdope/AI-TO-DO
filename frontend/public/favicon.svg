<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Red Pushpin Cap -->
  <rect x="7" y="0" width="2" height="1" fill="#ff5c5c" />
  <rect x="6" y="1" width="4" height="1" fill="#c72c2c" />
  <rect x="7" y="2" width="2" height="1" fill="#a11b1b" />
  
  <!-- Pin Needle -->
  <rect x="7" y="3" width="1" height="2" fill="#b5c2d1" />
  <rect x="8" y="3" width="1" height="2" fill="#7a8899" />
  
  <!-- Pin Shadow on Paper -->
  <rect x="8" y="5" width="2" height="1" fill="#d4ad1c" />

  <!-- Paper Yellow Base (interior coordinates: x=3..12, y=6..13) -->
  <rect x="3" y="6" width="10" height="8" fill="#ffd53d" />

  <!-- Paper Highlights (Top and Left inner edges) -->
  <rect x="3" y="6" width="9" height="1" fill="#fff275" />
  <rect x="3" y="7" width="1" height="6" fill="#fff275" />

  <!-- Checkmark (Green + Shadow) -->
  <rect x="5" y="9" width="1" height="1" fill="#22c55e" />
  <rect x="6" y="10" width="1" height="1" fill="#22c55e" />
  <rect x="7" y="9" width="1" height="1" fill="#22c55e" />
  <rect x="8" y="8" width="1" height="1" fill="#22c55e" />
  <rect x="9" y="7" width="1" height="1" fill="#22c55e" />

  <rect x="5" y="10" width="1" height="1" fill="#15803d" />
  <rect x="6" y="11" width="1" height="1" fill="#15803d" />
  <rect x="7" y="10" width="1" height="1" fill="#15803d" />
  <rect x="8" y="9" width="1" height="1" fill="#15803d" />
  <rect x="9" y="8" width="1" height="1" fill="#15803d" />

  <!-- Bottom-Right Fold/Curl (Dark Yellow) -->
  <rect x="12" y="13" width="1" height="1" fill="#caa322" />
  <rect x="11" y="13" width="1" height="1" fill="#caa322" />
  <rect x="12" y="12" width="1" height="1" fill="#caa322" />
  
  <!-- Fold Inner Borders -->
  <rect x="10" y="13" width="1" height="1" fill="#2b221a" opacity="0.15" />
  <rect x="11" y="12" width="1" height="1" fill="#2b221a" opacity="0.15" />
  <rect x="12" y="11" width="1" height="1" fill="#2b221a" opacity="0.15" />

  <!-- Paper Outer Borders (Dark Brown) -->
  <!-- Top Border -->
  <rect x="3" y="5" width="10" height="1" fill="#2b221a" />
  <!-- Bottom Border -->
  <rect x="3" y="14" width="10" height="1" fill="#2b221a" />
  <!-- Left Border -->
  <rect x="2" y="6" width="1" height="8" fill="#2b221a" />
  <!-- Right Border -->
  <rect x="13" y="6" width="1" height="8" fill="#2b221a" />
</svg>