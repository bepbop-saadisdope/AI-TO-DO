<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Shadow (offset right 2, down 2) -->
  <rect x="6" y="8" width="22" height="22" fill="#2d2219" opacity="0.25" />
  
  <!-- Note Board (Yellow Sticky Note) -->
  <rect x="4" y="6" width="22" height="22" fill="#ffd15c" />
  <!-- Fold/Dark edge shadow on the right/bottom of the note -->
  <rect x="25" y="6" width="1" height="22" fill="#e0ab34" />
  <rect x="4" y="27" width="22" height="1" fill="#e0ab34" />
  
  <!-- Scribbled lines (representing text) -->
  <rect x="7" y="11" width="13" height="2" fill="#b88314" />
  <rect x="7" y="16" width="16" height="2" fill="#b88314" />
  <rect x="7" y="21" width="9" height="2" fill="#b88314" />
  
  <!-- Red Pushpin -->
  <!-- Pin Shadow -->
  <rect x="13" y="7" width="5" height="2" fill="#2d2219" opacity="0.3" />
  <!-- Needle/Metal shaft -->
  <rect x="15" y="4" width="2" height="4" fill="#a0a4b0" />
  <!-- Red body -->
  <rect x="13" y="2" width="6" height="2" fill="#e03b3b" />
  <!-- Shiny highlight on pin -->
  <rect x="14" y="1" width="4" height="1" fill="#ff6666" />
  <rect x="15" y="0" width="2" height="1" fill="#ffffff" />
</svg>